services:
  - type: web_service
    name: InternTrack
    env: node
    plan: free
    branch: main
    # Use repository root so we can build frontend first, then backend
    root: .
    # Build frontend, then install backend deps (use npm ci in CI environments)
    buildCommand: bash -lc "cd frontend && npm ci && npm run build && cd backend && npm ci"
    # Start the backend service which serves the frontend build
    startCommand: bash -lc "cd backend && npm start"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
