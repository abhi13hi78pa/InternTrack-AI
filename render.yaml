services:
  - type: web_service
    name: InternTrack
    env: node
    plan: free
    branch: main
    # Backend API service only. Frontend is deployed separately.
    root: .
    buildCommand: bash -lc "cd backend && npm ci"
    startCommand: bash -lc "cd backend && npm start"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
