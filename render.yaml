services:
  - type: web_service
    name: InternTrack
    env: node
    plan: free
    branch: main
    # Full-stack service: build React, then serve it from Express with the API.
    root: .
    buildCommand: npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
